<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafaf9"/>
      <stop offset="1" stop-color="#f1f1ef"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="-0.05" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="-0.05" cy="0.1" r="0.55">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0c0c0b"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1" fill="#0f172a" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo + wordmark -->
  <g transform="translate(80, 90)">
    <rect width="64" height="64" rx="16" fill="url(#logo)"/>
    <path d="M32 12l16 8v12c0 9-6.8 16.8-16 18-9.2-1.2-16-9-16-18V20l16-8z"
          fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M24 32l6 6 10-12" fill="none" stroke="white"
          stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="32" font-family="Geist, system-ui, sans-serif" font-size="28"
          font-weight="600" fill="#0c0c0b" letter-spacing="-0.5">AutoSec</text>
    <text x="84" y="56" font-family="Geist, system-ui, sans-serif" font-size="16"
          fill="#6b6b67">autonomous dependency remediation</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 250)">
    <text x="0" y="0" font-family="Geist, system-ui, sans-serif" font-size="76"
          font-weight="600" fill="url(#accent)" letter-spacing="-2.5">Patch your dependencies,</text>
    <text x="0" y="92" font-family="Instrument Serif, Georgia, serif" font-size="84"
          font-style="italic" fill="#4f46e5" letter-spacing="-2">automatically.</text>
  </g>

  <!-- Subhead -->
  <text x="80" y="450" font-family="Geist, system-ui, sans-serif" font-size="24"
        fill="#4a4a47" letter-spacing="-0.3">Triages npm vulnerabilities · reads upstream changelogs · applies fixes</text>
  <text x="80" y="484" font-family="Geist, system-ui, sans-serif" font-size="24"
        fill="#4a4a47" letter-spacing="-0.3">verified against your own test suite.</text>

  <!-- Pills -->
  <g transform="translate(80, 540)" font-family="Geist Mono, ui-monospace, monospace" font-size="14">
    <g>
      <rect x="0" y="0" width="120" height="32" rx="16" fill="white" stroke="#e6e6e3"/>
      <text x="60" y="21" text-anchor="middle" fill="#2f2f2d">npm audit</text>
    </g>
    <g transform="translate(132, 0)">
      <rect x="0" y="0" width="160" height="32" rx="16" fill="white" stroke="#e6e6e3"/>
      <text x="80" y="21" text-anchor="middle" fill="#2f2f2d">claude headless</text>
    </g>
    <g transform="translate(304, 0)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="white" stroke="#e6e6e3"/>
      <text x="60" y="21" text-anchor="middle" fill="#2f2f2d">test oracle</text>
    </g>
    <g transform="translate(436, 0)">
      <rect x="0" y="0" width="160" height="32" rx="16" fill="white" stroke="#e6e6e3"/>
      <text x="80" y="21" text-anchor="middle" fill="#2f2f2d">self-diagnosis</text>
    </g>
  </g>

  <!-- Status pill (top right) -->
  <g transform="translate(960, 100)">
    <rect x="0" y="0" width="160" height="32" rx="16" fill="white" stroke="#e6e6e3"/>
    <circle cx="20" cy="16" r="4" fill="#10b981"/>
    <text x="32" y="21" font-family="Geist Mono, ui-monospace, monospace"
          font-size="12" fill="#2f2f2d">commit-local</text>
  </g>
</svg>
